name: Hephaestus Governance

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  evaluate:
    name: Run Sentinel & AI Evaluator
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Including the required backend tools to spin up FastAPI locally
          pip install fastapi uvicorn pydantic pydantic-settings google-generativeai requests typing-extensions

      - name: Inject Secure Keys
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Start Background Hephaestus API
        run: |
          # We boot the server in the background so our Python script can hit it
          uvicorn api.main:app --host 127.0.0.1 --port 8000 &
          echo "Waiting for API to initialize..."
          sleep 6

      - name: Execute Pull Request Evaluation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/pr_evaluator.py
